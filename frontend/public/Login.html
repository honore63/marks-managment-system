<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Marks Management System - Institutional Authentication Portal">
  <title>MMS | Login - Marks Management System</title>
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  
  <!-- Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="../src/styles/enterprise-design-system.css">
  
  <style>
    /* ════════════════════════════════════════════════════════════
       MODERN LOGIN PAGE STYLES
       ════════════════════════════════════════════════════════════ */
    
    :root {
      --primary: #4f46e5;
      --primary-light: #818cf8;
      --primary-dark: #3730a3;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-900: #0f172a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--slate-50) 0%, #e0e7ff 100%);
      color: var(--slate-900);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(79, 70, 229, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .login-container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px -12px rgba(15, 23, 42, 0.15),
                  0 0 0 1px rgba(15, 23, 42, 0.06);
      padding: 3rem;
      animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header Section */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 16px;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.2);
      color: white;
    }

    .logo-badge svg {
      width: 28px;
      height: 28px;
    }

    h1 {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 1.875rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: var(--slate-900);
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--slate-500);
      font-weight: 500;
      margin: 0;
    }

    /* Form Groups */
    .input-group {
      margin-bottom: 1.5rem;
    }

    .input-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--slate-700);
      margin-bottom: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      left: 1rem;
      color: var(--slate-400);
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: color 0.3s ease;
    }

    .form-input {
      width: 100%;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      background: var(--slate-50);
      border: 1px solid var(--slate-300);
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--slate-900);
      transition: all 0.2s ease;
    }

    .form-input::placeholder {
      color: var(--slate-400);
    }

    .form-input:focus {
      outline: none;
      background: white;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .form-input:focus ~ i {
      color: var(--primary);
    }

    .toggle-pass {
      position: absolute;
      right: 1rem;
      cursor: pointer;
      color: var(--slate-400);
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
      background: none;
      border: none;
      padding: 0;
    }

    .toggle-pass:hover {
      color: var(--slate-700);
    }

    /* Options Section */
    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--slate-600);
      font-weight: 500;
    }

    .remember-me input {
      cursor: pointer;
      accent-color: var(--primary);
    }

    .forgot-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: color 0.2s ease;
    }

    .forgot-link:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* Buttons */
    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(79, 70, 229, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login.secondary {
      background: transparent;
      border: 1px solid var(--slate-300);
      color: var(--slate-900);
      box-shadow: none;
      margin-top: 0.5rem;
    }

    .btn-login.secondary:hover {
      background: var(--slate-50);
      border-color: var(--slate-400);
      box-shadow: var(--shadow-sm);
    }

    .btn-gradient {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
    }

    .loader {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer Section */
    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--slate-600);
      font-weight: 500;
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .footer a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* Toast Notifications */
    #toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 400px;
    }

    .toast {
      padding: 1rem 1.25rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 500;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      animation: slideInRight 0.3s ease;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .toast.success {
      background: var(--success);
      color: white;
    }

    .toast.error {
      background: var(--danger);
      color: white;
    }

    .toast.info {
      background: var(--primary);
      color: white;
    }

    .toast.warning {
      background: var(--warning);
      color: white;
    }

    /* Modals */
    div[id*="modal"] {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(8px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .login-container {
        padding: 2rem;
        max-width: 100%;
      }

      h1 {
        font-size: 1.5rem;
      }

      .form-input {
        font-size: 16px; /* Prevents zoom on iOS */
      }

      .options {
        flex-direction: column;
        align-items: flex-start;
      }

      #toast-container {
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
      }

      .toast {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 1.5rem;
        border-radius: 16px;
      }

      h1 {
        font-size: 1.25rem;
      }

      .subtitle {
        font-size: 0.85rem;
      }

      .input-group {
        margin-bottom: 1.25rem;
      }

      .btn-login {
        padding: 0.875rem;
        font-size: 0.95rem;
      }
    }
  </style>

    <link rel="stylesheet" href="../src/styles/mms-polish.css">
</head>
<body>

  <div class="login-container premium-card animate-entrance">
    <div class="header">
      <div class="logo-badge">
        <i data-lucide="shield-check" color="white"></i>
      </div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Secure Institutional Access (MMS v2.0)</p>
    </div>

    <form id="login-form">
      <div class="input-group">
        <label class="input-label">Identity Identifier</label>
        <div class="input-wrapper">
          <i data-lucide="user" size="18"></i>
          <input type="text" id="identifier" class="form-input" placeholder="Email / Phone / SDMS Code" required>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <div class="input-wrapper">
          <i data-lucide="lock" size="18"></i>
          <input type="password" id="password" class="form-input" placeholder="Enter password" required>
          <i data-lucide="eye" class="toggle-pass" id="toggle-password" size="18"></i>
        </div>
      </div>

      <div class="options">
        <label class="remember-me">
          <input type="checkbox" id="remember"> Remember Me
        </label>
      </div>

      <button type="submit" class="btn-login btn-gradient" id="btn-login">
    <span id="btn-text">Sign In to Dashboard</span>
        <div class="loader" id="loader"></div>
      </button>
    </form>




  </div>

  <div id="toast-container"></div>




  <script src="../src/services/db.js"></script>
  <script>
    /* Toast Notification System */
    function toast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toastEl = document.createElement('div');
      toastEl.className = `toast ${type}`;
      toastEl.textContent = message;
      container.appendChild(toastEl);
      
      setTimeout(() => {
        toastEl.style.animation = 'slideOutRight 0.3s ease forwards';
        setTimeout(() => toastEl.remove(), 300);
      }, 4000);
    }

    lucide.createIcons();

    const el = (id) => document.getElementById(id);

    // 1. AUTO-SESSION RESTORATION
    window.addEventListener('load', async () => {
        try {
            const session = await DB.restoreSession();
            if (session && session.profile) {
                console.log('[AUTH] Valid session restored. Redirecting...');
                redirectToDashboard(session.profile.role);
            }
        } catch (e) { console.warn('[AUTH] No active session found.'); }
        
        // Auto-fill last identifier if remembered
        const last = localStorage.getItem('mms_last_ident');
        if (last) el('identifier').value = last;
    });

    function redirectToDashboard(role) {
        let target = 'teacher-portal.html';
        if (role === 'system_admin') target = 'system-admin-portal.html';
        else if (role === 'admin') target = 'admin-portal.html';
        window.location.href = target;
    }

    // Toggle Password Visibility
    el('toggle-password').addEventListener('click', function() {
        const pass = el('password');
        const type = pass.getAttribute('type') === 'password' ? 'text' : 'password';
        pass.setAttribute('type', type);
        this.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
        lucide.createIcons();
    });

    // Login Handler with Timeout protection
    el('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const ident = el('identifier').value.trim();
        const pass = el('password').value;
        const remember = el('remember').checked;
        const btn = el('btn-login');
        const btnText = el('btn-text');
        const loader = el('loader');

        try {
            btn.disabled = true;
            btnText.textContent = 'Verifying Identity...';
            loader.style.display = 'block';

            // 30-second timeout to prevent "Infinite Loading"
            const loginPromise = DB.signIn(ident, pass);
            const timeoutPromise = new Promise((_, reject) => 
                setTimeout(() => reject(new Error('Connection timed out. Please check your internet or Supabase configuration.')), 30000)
            );

            const { user, profile } = await Promise.race([loginPromise, timeoutPromise]);

            toast('✅ Identity Verified. Synchronizing...', 'success');

            if (remember) localStorage.setItem('mms_last_ident', ident);

            setTimeout(() => redirectToDashboard(profile.role), 600);

        } catch (err) {
            console.error('[AUTH_FATAL]', err);
            let msg = err.message || 'Institutional login failed.';
            if (msg.includes('fetch')) msg = 'Network Error: Cannot reach Supabase. Check your API URL/Key.';
            
            toast(msg, 'error');
            btn.disabled = false;
            btnText.textContent = 'Sign In to Dashboard';
            loader.style.display = 'none';
        }
    });




  </script>
</body>
</html>
